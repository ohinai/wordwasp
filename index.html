  { name: "Рабочий", sub: "Worker", pct: 0.05 },
  { name: "Товарищ", sub: "Comrade", pct: 0.15 },
  { name: "Ударник", sub: "Shock Worker", pct: 0.30 },
  { name: "Стаханов", sub: "Stakhanovite", pct: 0.50 },
  { name: "Комиссар", sub: "Commissar", pct: 0.70 },
  { name: "Герой Труда", sub: "Hero of Labor", pct: 1.0 },
];

// === HEX GRID: proper honeycomb tiling (pointy-top) ===
// For pointy-top hexes with circumradius R:
//   East/West neighbors: at distance sqrt(3)*R, horizontal only
//   Diagonal neighbors:  at (±sqrt(3)*R/2, ±3R/2) — closer horizontally, offset vertically
// The two flat vertical edges touch east/west neighbors; slanted edges touch diagonals.
const S = 54;                           // SVG bounding box size
const R = S / 2;                        // circumradius
const DX = Math.sqrt(3) * R;            // full horizontal neighbor distance
const HDX = DX / 2;                     // half (for diagonals)
const VDY = 1.5 * R;                    // vertical distance to diagonals
const GW = 2 * DX + S;                  // grid width
const GH = 2 * VDY + S;                 // grid height
const CX = GW / 2, CY = GH / 2;

// Center + 6 neighbors: top-left, top-right, right, bottom-right, bottom-left, left
const HC = [
  [CX,       CY],           // 0: center
  [CX - HDX, CY - VDY],     // 1: upper-left
  [CX + HDX, CY - VDY],     // 2: upper-right
  [CX + DX,  CY],           // 3: right
  [CX + HDX, CY + VDY],     // 4: lower-right
  [CX - HDX, CY + VDY],     // 5: lower-left
  [CX - DX,  CY],           // 6: left
];

function makeHexSVG(letter, isCenter) {
  // Pointy-top hexagon vertices
  const pts = Array.from({length:6}, (_,i) => {
    const a = (Math.PI / 3) * i - Math.PI / 6;
    return `${R + R * Math.cos(a)},${R + R * Math.sin(a)}`;
  }).join(" ");
  let svg = `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}">`;
  svg += `<polygon points="${pts}" fill="${isCenter ? '#CC0000' : '#1C1C1C'}" stroke="${isCenter ? '#FFD700' : '#882222'}" stroke-width="${isCenter ? 2.5 : 1.5}"/>`;
  if (isCenter) {
    svg += `<polygon points="${pts}" fill="none" stroke="#FFD70088" stroke-width="0.8" stroke-dasharray="2.5,2.5" transform="translate(${R},${R}) scale(0.76) translate(${-R},${-R})"/>`;
  }
  svg += `<text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle" fill="${isCenter ? '#FFD700' : '#F5F0E1'}" style="font-size:${S*0.4}px;font-family:'Oswald',sans-serif;font-weight:700;user-select:none">${letter}</text>`;
  svg += `</svg>`;
  return svg;
}

// State
const puzzle = PUZZLES[Math.floor(Math.random() * PUZZLES.length)];
let outerLetters = [...puzzle.outer];
const allLetters = [puzzle.center, ...puzzle.outer];
const allLettersLower = new Set(allLetters.map(l => l.toLowerCase()));
let validWords = [];
WORD_SET.forEach(w => {
  if (!w.includes(puzzle.center.toLowerCase())) return;
  for (const ch of w) { if (!allLettersLower.has(ch)) return; }
  validWords.push(w);
});
const maxScore = validWords.reduce((s, w) => s + wordScore(w), 0);

let input = "";
let found = [];
let score = 0;
let showFoundState = false;
let msgTimer = null;

function wordScore(word) {
  if (word.length === 4) return 1;
  let base = word.length;
  if (new Set(word.split("")).size === allLettersLower.size) base += 7;
  return base;
}

function getRank() {
  const pct = maxScore > 0 ? score / maxScore : 0;
  let rank = RANKS[0];
  for (const r of RANKS) { if (pct >= r.pct) rank = r; }
  return rank;
}

function buildGrid() {
  const grid = document.getElementById("hexGrid");
  grid.style.width = GW + "px";
  grid.style.height = GH + "px";
  grid.innerHTML = "";
  const displayLetters = [puzzle.center, ...outerLetters];
  displayLetters.forEach((letter, i) => {
    const cell = document.createElement("div");
    cell.className = "hex-cell";
    cell.style.left = HC[i][0] + "px";
    cell.style.top = HC[i][1] + "px";
    cell.innerHTML = makeHexSVG(letter, i === 0);
    // Use pointerdown for instant response across mouse/touch/pen
    const press = (e) => {
      e.preventDefault();
      cell.classList.add("pressed");
      addLetter(letter);
    };
    const release = () => cell.classList.remove("pressed");
    if ('PointerEvent' in window) {
      cell.addEventListener("pointerdown", press);
      cell.addEventListener("pointerup", release);
      cell.addEventListener("pointercancel", release);
      cell.addEventListener("pointerleave", release);
    } else {
      // Fallback for older iOS
      cell.addEventListener("touchstart", press, { passive: false });
      cell.addEventListener("touchend", release);
      cell.addEventListener("touchcancel", release);
      cell.addEventListener("mousedown", press);
      cell.addEventListener("mouseup", release);
      cell.addEventListener("mouseleave", release);
    }
    grid.appendChild(cell);
  });
}

function addLetter(letter) { input += letter; renderInput(); }

function renderInput() {
  const el = document.getElementById("inputDisplay");
  let html = "";
  for (const ch of input) {
    const cls = ch === puzzle.center ? "center-letter" : "normal-letter";
    html += `<span class="${cls}">${ch}</span>`;
  }
  html += `<span class="cursor">|</span>`;
  el.innerHTML = html;
}

function showMessage(msg, type) {
  const el = document.getElementById("message");
  el.textContent = msg;
  el.className = "msg " + type;
  el.style.opacity = "1";
  if (type === "error") {
    const inp = document.getElementById("inputDisplay");
    inp.classList.add("shaking");
    setTimeout(() => inp.classList.remove("shaking"), 500);
  }
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => { el.style.opacity = "0"; }, 2200);
}

function updateRank() {
  const rank = getRank();
  document.getElementById("rankName").textContent = rank.name;
  document.getElementById("rankSub").textContent = rank.sub;
  document.getElementById("scoreNum").textContent = score;
  const nextRank = RANKS[RANKS.indexOf(rank) + 1];
  const progress = nextRank ? ((score / maxScore - rank.pct) / (nextRank.pct - rank.pct)) * 100 : 100;
  document.getElementById("progressFill").style.width = Math.min(100, Math.max(0, progress)) + "%";
}

function updateFoundDisplay() {
  const btn = document.getElementById("foundToggle");
  const list = document.getElementById("foundList");
  const remaining = validWords.length - found.length;
  if (found.length > 0) {
    const arrow = showFoundState ? "▾" : "▸";
    btn.textContent = `${arrow} ${found.length} of ${validWords.length} found — ${remaining} remaining`;
  } else {
    btn.textContent = `0 of ${validWords.length} words — serve the State!`;
  }
  if (showFoundState && found.length > 0) {
    list.style.display = "flex";
    list.innerHTML = found.map(w => {
      const isPangram = new Set(w.split("")).size === allLettersLower.size;
      return `<span class="found-word${isPangram ? ' pangram' : ''}">${isPangram ? '★ ' : ''}${w}</span>`;
    }).join("");
  } else {
    list.style.display = "none";
  }
}

function doDelete() { input = input.slice(0, -1); renderInput(); }
function doShuffle() { outerLetters.sort(() => Math.random() - 0.5); buildGrid(); }

function doSubmit() {
  const word = input.toLowerCase().trim();
  input = ""; renderInput();
  if (word.length < 4) return showMessage("Too short — 4 letters minimum", "error");
  if (!word.includes(puzzle.center.toLowerCase())) return showMessage("Must contain " + puzzle.center + "!", "error");
  for (const ch of word) { if (!allLettersLower.has(ch)) return showMessage("Invalid letter!", "error"); }
  if (found.includes(word)) return showMessage("Already found!", "error");
  if (!validWords.includes(word)) return showMessage("Not in word list", "error");
  const pts = wordScore(word);
  const isPangram = new Set(word.split("")).size === allLettersLower.size;
  found.unshift(word);
  score += pts;
  showMessage(isPangram ? "★ PANGRAM! +" + pts + " ★" : pts === 1 ? "+1" : "Excellent! +" + pts, "success");
  updateRank(); updateFoundDisplay();
}

function toggleFound() { showFoundState = !showFoundState; updateFoundDisplay(); }

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") { e.preventDefault(); doSubmit(); }
  else if (e.key === "Backspace") { e.preventDefault(); doDelete(); }
  else if (/^[a-zA-Z]$/.test(e.key)) {
    const upper = e.key.toUpperCase();
    if (allLetters.includes(upper)) addLetter(upper);
  }
});

buildGrid(); updateRank(); updateFoundDisplay();
</script>

[184.5,"G#3",0.5],[184.5,"C4",0.5],[184.5,"F4",0.5],[185.0,"C3",0.5],[185.5,"G#3",0.5],[185.5,"C#4",0.5],[185.5,"F4",0.5],[186.0,"G#2",0.5],[186.5,"G#3",0.5],[186.5,"C4",0.5],[186.5,"D#4",0.5],[187.0,"A2",0.5],[187.5,"A3",0.5],[187.5,"D#4",0.5],[187.5,"F4",0.5],[188.0,"A#2",0.5],[188.5,"A#3",0.5],[188.5,"C#4",0.5],[188.5,"F4",0.5],[189.0,"G2",0.5],[189.5,"A#3",0.5],[189.5,"C#4",0.5],[189.5,"F4",0.5],[190.0,"G#2",0.5],[190.5,"G#3",0.5],[190.5,"C4",0.5],[190.5,"F4",0.5],[191.0,"A2",0.5],[191.5,"A3",0.5],[191.5,"D#4",0.5],[191.5,"F4",0.5],[192.0,"A#2",0.5],[192.5,"A#3",0.5],[192.5,"C#4",0.5],[192.5,"F4",0.5],[193.0,"C#3",0.5],[193.5,"A#3",0.5],[193.5,"C#4",0.5],[193.5,"F4",0.5],[194.0,"C3",0.5],[194.5,"G#3",0.5],[194.5,"C4",0.5],[194.5,"F4",0.5],[195.0,"C3",0.5],[195.5,"G#3",0.5],[195.5,"C4",0.5],[195.5,"F4",0.5],[196.0,"C3",0.5],[196.5,"A#3",0.5],[196.5,"C4",0.5],[196.5,"E4",0.5],[197.0,"C3",0.5],[197.5,"A#3",0.5],[197.5,"C4",0.5],[197.5,"E4",0.5],[198.0,"F3",0.5],[198.5,"G#3",0.5],[198.5,"C4",0.5],[198.5,"F4",0.5],[199.0,"C3",0.5],[199.5,"G#3",0.5],[199.5,"C4",0.5],[199.5,"F4",0.5],[200.0,"F3",0.8],[201.0,"C3",0.8],[202.0,"F3",0.8],[203.0,"C3",0.8],[204.0,"F3",0.8],[205.0,"C3",0.8],[205.0,"A#3",0.8],[205.0,"C4",0.8],[205.0,"E4",0.8],[206.0,"F3",0.8],[206.0,"G#3",0.8],[206.0,"C4",0.8],[206.0,"F4",0.8]];
const SONG_BEATS = 206.8;

// Native tempo was 110 BPM. Bump to 124 for parade cadence.
const MARCH_BPM = 124;

let musicPlaying = false;
let toneStarted = false;
let trumpetSynth = null, violinSynth = null, celloSynth = null;
let kick = null, snare = null, snareMetal = null;
let parts = [];

function initSynths() {
  if (trumpetSynth) return;

  const reverb = new Tone.Reverb({ decay: 1.6, wet: 0.18 }).toDestination();

  // TRUMPET (melody) - bright, forward sawtooth
  trumpetSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: "sawtooth" },
    envelope: { attack: 0.012, decay: 0.1, sustain: 0.7, release: 0.15 },
    volume: -12,
  }).connect(reverb);

  // VIOLIN (countermelody) - bowed character, slower attack
  violinSynth = new Tone.PolySynth(Tone.AMSynth, {
    harmonicity: 2,
    oscillator: { type: "sawtooth" },
    envelope: { attack: 0.08, decay: 0.15, sustain: 0.8, release: 0.3 },
    modulation: { type: "sine" },
    modulationEnvelope: { attack: 0.1, decay: 0.1, sustain: 0.5, release: 0.3 },
    volume: -20,
  }).connect(reverb);

  // CELLO (bass + oompah) - warm filtered sawtooth
  celloSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: "sawtooth" },
    envelope: { attack: 0.015, decay: 0.12, sustain: 0.45, release: 0.15 },
    volume: -15,
  }).connect(reverb);

  // KICK: marching bass drum
  kick = new Tone.MembraneSynth({
    pitchDecay: 0.04, octaves: 5,
    oscillator: { type: "sine" },
    envelope: { attack: 0.001, decay: 0.25, sustain: 0.01, release: 0.2 },
    volume: -6,
  }).toDestination();

  // SNARE: noise + metallic snap
  snare = new Tone.NoiseSynth({
    noise: { type: "white" },
    envelope: { attack: 0.001, decay: 0.12, sustain: 0, release: 0.04 },
    volume: -14,
  }).toDestination();
  snareMetal = new Tone.MetalSynth({
    frequency: 250,
    envelope: { attack: 0.001, decay: 0.08, release: 0.02 },
    harmonicity: 5.1, modulationIndex: 16, resonance: 3000, octaves: 1,
    volume: -28,
  }).toDestination();
}

function startKatyusha() {
  initSynths();

  const bSec = 60 / MARCH_BPM;

  const melEvents = MELODY_EVS.map(([t, n, d]) => [t * bSec, { note: n, dur: d * bSec * 0.85 }]);
  const harmEvents = HARMONY_EVS.map(([t, n, d]) => [t * bSec, { note: n, dur: d * bSec * 0.85 }]);
  const bassEvents = BASS_EVS.map(([t, n, d]) => [t * bSec, { note: n, dur: d * bSec * 0.75 }]);

  // Drums: kick on beat 1 (odd beats in 2/4), snare on beat 2 (even beats)
  const kickEvents = [];
  const snareEvents = [];
  const total = Math.ceil(SONG_BEATS);
  for (let b = 0; b < total; b++) {
    const tSec = b * bSec;
    if (b % 2 === 0) kickEvents.push([tSec, null]);
    else snareEvents.push([tSec, null]);
  }

  const songLenSec = SONG_BEATS * bSec;

  const melPart = new Tone.Part((time, v) => {
    trumpetSynth.triggerAttackRelease(v.note, v.dur, time, 0.9);
  }, melEvents);

  const harmPart = new Tone.Part((time, v) => {
    violinSynth.triggerAttackRelease(v.note, v.dur, time, 0.6);
  }, harmEvents);

  const bassPart = new Tone.Part((time, v) => {
    celloSynth.triggerAttackRelease(v.note, v.dur, time, 0.75);
  }, bassEvents);

  const kickPart = new Tone.Part((time) => {
    kick.triggerAttackRelease("C1", "8n", time, 0.9);
  }, kickEvents);

  const snarePart = new Tone.Part((time) => {
    snare.triggerAttackRelease("16n", time, 0.8);
    snareMetal.triggerAttackRelease("32n", time, 0.3);
  }, snareEvents);

  parts = [melPart, harmPart, bassPart, kickPart, snarePart];
  parts.forEach(p => {
    p.loop = true;
    p.loopEnd = songLenSec + 0.5;
  });

  Tone.Transport.stop();
  Tone.Transport.cancel();
  Tone.Transport.position = 0;
  parts.forEach(p => p.start(0));
  Tone.Transport.start("+0.1");
}

function stopKatyusha() {
  Tone.Transport.stop();
  parts.forEach(p => { if (p) { p.stop(); p.dispose(); } });
  parts = [];
}

async function toggleMusic() {
  const btn = document.getElementById("musicBtn");
  // If Tone.js didn't load (blocked CDN, offline, etc.), fail silently
  if (typeof Tone === "undefined") {
    btn.style.opacity = "0.3";
    btn.title = "Audio library unavailable";
    return;
  }
  try {
    if (!toneStarted) {
      btn.classList.add("loading");
      // Tone.start() creates and resumes the AudioContext from the user gesture.
      // This is sufficient to unlock audio on iOS Safari.
      await Tone.start();
      toneStarted = true;
      btn.classList.remove("loading");
    }
    // If context got suspended between toggles (e.g. tab hidden), resume it.
    if (Tone.context.state === "suspended") {
      await Tone.context.resume();
    }
    musicPlaying = !musicPlaying;
    if (musicPlaying) {
      btn.classList.add("playing");
      startKatyusha();
    } else {
      btn.classList.remove("playing");
      stopKatyusha();
    }
  } catch (err) {
    btn.classList.remove("loading", "playing");
    musicPlaying = false;
    console.warn("Audio failed:", err);
  }
}
